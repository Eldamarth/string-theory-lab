<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#111827"/>
  <!-- fret lines -->
  <line x1="10" y1="8" x2="10" y2="24" stroke="#374151" stroke-width="1.5"/>
  <line x1="18" y1="8" x2="18" y2="24" stroke="#374151" stroke-width="1.5"/>
  <line x1="26" y1="8" x2="26" y2="24" stroke="#374151" stroke-width="1.5"/>
  <!-- nut -->
  <line x1="5" y1="8" x2="5" y2="24" stroke="#d1d5db" stroke-width="2.5"/>
  <!-- strings (vibrating sine wave shape for middle string) -->
  <line x1="5" y1="12" x2="29" y2="12" stroke="#6b7280" stroke-width="1"/>
  <path d="M5,16 C9,11 13,11 16,16 S23,21 29,16" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="5" y1="20" x2="29" y2="20" stroke="#6b7280" stroke-width="1"/>
  <!-- fret dot at 3rd fret position -->
  <circle cx="14" cy="16" r="2.5" fill="#3b82f6"/>
</svg>
